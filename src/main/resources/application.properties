# ==============================
# CineBook Pro - Configuration
# ==============================

# Server
server.port=${PORT:8080}

# ==============================
# MySQL Database (Docker + Local Compatible)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cinebook_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=CineBookProSuperSecretKeyForJWTTokenGenerationAndValidation2024
app.jwt.expiration-ms=86400000

# ==============================
# App Settings
# ==============================
app.seat-lock.ttl-minutes=10
app.booking.max-seats-per-booking=8

# ==============================
# Logging
# ==============================
logging.level.com.cinebook=DEBUG
logging.level.org.springframework.security=INFO